# Tests sources against a couple of local destinations

name: src local

on:
  workflow_call:
  workflow_dispatch:

env:

  # RUNTIME__SENTRY_DSN: https://6f6f7b6f8e0f458a89be4187603b55fe@o1061158.ingest.sentry.io/4504819859914752
  RUNTIME__LOG_LEVEL: ERROR

  ACTIVE_DESTINATIONS: "[\"duckdb\", \"postgres\", \"filesystem\"]"
  ALL_FILESYSTEM_DRIVERS: "[\"file\"]"

jobs:
  run_loader:
    name: ${{ matrix.display_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: postgres-sources-load
            dbms_extras: "--extra postgres --extra postgis"
            needs_postgres: true
            pytest_mark: "not mssql and not oracle"
            suite: sources-load
          - display_name: postgres-sql-database
            dbms_extras: "--extra postgres --extra postgis"
            needs_postgres: true
            pytest_mark: "not mssql and not oracle"
            suite: sql-database
          - display_name: mssql-sources-load
            dbms_extras: "--extra mssql"
            needs_mssql: true
            pytest_mark: "mssql"
            suite: sources-load
          - display_name: mssql-sql-database
            dbms_extras: "--extra mssql"
            needs_mssql: true
            pytest_mark: "mssql"
            suite: sql-database
          # Oracle: sqlalchemy 2 / sql_database only (no sources-load leg on SA 1.4)
          - display_name: oracle-sql-database
            dbms_extras: "--extra oracle"
            needs_oracle: true
            pytest_mark: "oracle"
            suite: sql-database
    defaults:
      run:
        shell: bash
    runs-on: blacksmith-8vcpu-ubuntu-2404
    env:
      # Prevent implicit resyncs by `uv run`; this is ignored by explicit `uv sync` commands.
      UV_NO_SYNC: "1"

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Start postgres
        run: docker compose -f "tests/load/sources/sql_database/docker-compose.yml" up -d --wait postgres
        if: ${{ matrix.needs_postgres }}

      - name: Start mssql
        run: docker compose -f "tests/load/sources/sql_database/docker-compose.yml" up -d --wait mssql
        if: ${{ matrix.needs_mssql }}

      - name: Start oracle
        run: docker compose -f "tests/load/sources/sql_database/docker-compose.yml" up -d --wait oracle
        if: ${{ matrix.needs_oracle }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          activate-environment: true
          enable-cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install --yes msodbcsql18
          uv sync --group pipeline --group sources --extra duckdb --extra parquet --extra filesystem --extra cli --extra sql_database --group adbc ${{ matrix.dbms_extras }}

      - name: Copy secrets for local tests
        run: |
          cp tests/.dlt/dev.secrets.toml tests/.dlt/secrets.toml

      - name: Run sources load tests (sqlalchemy 1.4)
        run: make test-sources-load
        env:
          PYTEST_XDIST_N: auto
          PYTEST_MARKERS: ${{ matrix.pytest_mark }}
        if: matrix.suite == 'sources-load'

      - name: Upgrade sql alchemy
        run: make install-sqlalchemy2
        if: matrix.suite == 'sql-database'

      - name: Run sql_database source tests (sqlalchemy 2)
        run: make test-sources-sql-database
        env:
          PYTEST_XDIST_N: auto
          PYTEST_MARKERS: ${{ matrix.pytest_mark }}
        if: matrix.suite == 'sql-database'

      - name: Stop databases
        run: docker compose -f "tests/load/sources/sql_database/docker-compose.yml" down -v
        if: ${{ always() }}
