name: airflow

on:
  workflow_call:
  workflow_dispatch:

jobs:
  run_airflow:
    name: ${{ matrix.display_name }}
    runs-on: blacksmith-8vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: airflow-2
            airflow-version: "2"
            python-version: "3.12"
            airflow-specifier: ">=2.8.0,<3"
            run-unit-tests: true
            run-smoke-test: false
          - display_name: airflow-3
            airflow-version: "3"
            python-version: "3.12"
            airflow-specifier: ">=3.1,<4"
            run-unit-tests: false
            run-smoke-test: true

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --group pipeline --extra duckdb --extra parquet
          uv run python tools/install_airflow_ci.py '${{ matrix.airflow-specifier }}'

      - name: Run unit tests
        if: matrix.run-unit-tests
        run: pytest tests/helpers/airflow_tests

      - name: Run smoke test
        if: matrix.run-smoke-test
        run: cd tests/helpers/airflow_tests/smoke && uv run python run.py
