
name: dbt

on:
  workflow_call:
  workflow_dispatch:

env:

  DLT_SECRETS_TOML: ${{ secrets.DLT_SECRETS_TOML }}
  RUNTIME__LOG_LEVEL: ERROR

jobs:
  run_dbt:
    name: ${{ matrix.display_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: no-venv
            suite: no-venv
          - display_name: venv
            suite: venv
    defaults:
      run:
        shell: bash
    runs-on: blacksmith-8vcpu-ubuntu-2404

    steps:

      - name: Check out
        uses: actions/checkout@master
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          activate-environment: true
          enable-cache: true

      - name: Install dependencies
        # install dlt with postgres support
        run: uv sync --extra postgres --extra postgis --group dbt --group providers

      - name: create secrets.toml
        run: pwd && echo "$DLT_SECRETS_TOML" > tests/.dlt/secrets.toml

      - name: Run dbt tests
        run: make test-dbt-no-venv
        env:
          PYTEST_XDIST_N: 3
        if: matrix.suite == 'no-venv'

      - name: Remove dbt-core
        run: uv run pip uninstall dbt-core -y
        if: matrix.suite == 'venv'

      - name: Run dbt runner with venv - Linux/MAC
        run: make test-dbt-runner-venv
        env:
          PYTEST_XDIST_N: 3
        if: matrix.suite == 'venv'
