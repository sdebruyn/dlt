
name: dbt

on:
  workflow_call:
  workflow_dispatch:

env:

  DLT_SECRETS_TOML: ${{ secrets.DLT_SECRETS_TOML }}
  RUNTIME__LOG_LEVEL: ERROR

jobs:
  run_dbt:
    name: ${{ matrix.display_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: no-venv
            suite: no-venv
          - display_name: venv
            suite: venv
    defaults:
      run:
        shell: bash
    runs-on: blacksmith-8vcpu-ubuntu-2404

    steps:

      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          persist-credentials: false
          # fork code runs by design, gated by per-run `fork-ci` environment approval
          allow-unsafe-pr-checkout: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          activate-environment: true
          # fork runs (pull_request_target) must not write the default-branch cache scope
          enable-cache: ${{ github.event_name != 'pull_request_target' }}

      - name: Install dependencies
        # install dlt with postgres support
        run: uv sync --extra postgres --extra postgis --group dbt --group providers

      - name: create secrets.toml
        run: pwd && echo "$DLT_SECRETS_TOML" > tests/.dlt/secrets.toml

      - name: Run dbt tests
        run: make test-dbt-no-venv
        env:
          PYTEST_XDIST_N: 3
        if: matrix.suite == 'no-venv'

      - name: Remove dbt-core
        run: uv run pip uninstall dbt-core -y
        if: matrix.suite == 'venv'

      - name: Run dbt runner with venv - Linux/MAC
        run: make test-dbt-runner-venv
        env:
          PYTEST_XDIST_N: 3
        if: matrix.suite == 'venv'
